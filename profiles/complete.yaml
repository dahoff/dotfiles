# profiles/complete.yaml - Full application manifest
# All apps are included. This is the default profile.
# Order matters: apps are installed in the order listed.

apps:
  - name: packages
    dir: packages

  - name: git
    dir: git

  - name: bash
    dir: bash
    flags: --append

  - name: scripts
    dir: scripts

  - name: tmux
    dir: tmux

  - name: claude
    dir: claude
