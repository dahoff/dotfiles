##### ============================================================================
##### Modern tmux configuration (WSL + SSH + Windows Terminal optimized)
##### ============================================================================


##### --- Core Behavior ----------------------------------------------------------

# Set backtick (`) as prefix instead of Ctrl+b
set -g prefix `
unbind C-b

# Double-tap ` to send literal backtick to terminal
bind ` send-keys '`'

# Alt+` also sends literal backtick (easier to remember)
bind -n M-` send-keys '`'

# Note: Shift+` types ~ normally (no special config needed)

# Keep SSH agent forwarding working across reconnects
# The symlink at ~/.ssh/ssh_auth_sock is maintained by 10-ssh-agent.sh
set-environment -g SSH_AUTH_SOCK ~/.ssh/ssh_auth_sock

# Near-zero delay after pressing Escape (default 500ms causes lag in vim)
set -g escape-time 10

# Enable mouse support
# - Scroll wheel enters copy-mode automatically
# - Click to select panes
# - Drag to resize panes
set -g mouse on

# Use Vim-style keys in copy-mode
# - h/j/k/l navigation
# - g / G top/bottom
# - / search
setw -g mode-keys vi

# Use Vim-style keys in tmux command/status prompts
set -g status-keys vi

# Explicitly enable OSC 52 clipboard integration
# Allows copying from remote tmux (over SSH) directly
# into Windows clipboard via Windows Terminal
set -g set-clipboard on


# Copy-mode selection highlight (default blue is hard to see)
set -g mode-style bg=colour201,fg=colour235,bold

##### --- Copy-mode (Vim-style behavior) ----------------------------------------

# 'v' begins visual selection
bind -T copy-mode-vi v send -X begin-selection

# 'V' selects entire line (linewise selection)
bind -T copy-mode-vi V send -X select-line

# 'y' copies selection but stays in copy-mode
# (useful for copying multiple regions without exiting)
# copy-pipe also runs ~/.tmux/.tmux-yank.sh for OSC 52 clipboard in popups
bind -T copy-mode-vi y send -X copy-pipe "~/.tmux/.tmux-yank.sh"

# 'Enter' copies selection and exits copy-mode
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "~/.tmux/.tmux-yank.sh"

# 'p' pastes tmux buffer into pane (exits copy-mode first)
bind -T copy-mode-vi p "send -X cancel; paste-buffer"

# 'P' same as 'p' (kept for symmetry)
bind -T copy-mode-vi P "send -X cancel; paste-buffer"

# Mouse: drag to select, release to copy and exit copy-mode
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "~/.tmux/.tmux-yank.sh"

# Mouse: double-click to select word and copy
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-and-cancel "~/.tmux/.tmux-yank.sh"

# Mouse: triple-click to select line and copy
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-and-cancel "~/.tmux/.tmux-yank.sh"

##### --- Popup windows (quick access, no prefix needed) ---
# Ctrl+p: Persistent popup shell (state survives close/reopen)
# - First open creates a hidden background session (_popup_<session>)
# - Ctrl+p again hides it (shell keeps running in background)
# - Copy-mode: scroll wheel up, or ` then [
# - 'exit' to destroy the popup session permanently
#
# The popup session uses key-table "popup", so only these bindings are active
# inside it. Everything else passes through to the inner tmux client.
bind -n C-p display-popup -E -w 80% -h 50% "~/.tmux/.tmux-popup.sh"

# Ctrl+l: Lazygit popup (persistent, opens in current pane's directory)
# - Quitting lazygit (q) destroys session; next Ctrl+l opens fresh
# - Note: overrides shell's Ctrl+l (clear screen); use 'clear' command instead
bind -n C-l display-popup -E -w 90% -h 90% -d '#{pane_current_path}' "~/.tmux/.tmux-lazygit.sh"

# Inside popup: toggle keys hide the popup, backtick simulates prefix for copy-mode
bind -T popup   C-p        detach
bind -T popup   C-l        detach
bind -T popup   C-t        kill-session
bind -T popup   '`'        switch-client -T popup-prefix
bind -T popup   WheelUpPane      copy-mode -e \; send-keys -M
bind -T popup   MouseDrag1Pane   copy-mode -M
bind -T popup   DoubleClick1Pane copy-mode -M
bind -T popup   TripleClick1Pane copy-mode -M

# popup-prefix table: backtick + key (mirrors standard prefix table)
bind -T popup-prefix '[' copy-mode -t "=_popup_#{session_name}"

# Lazygit key-table: like popup but without WheelUpPane (lazygit handles its own scrolling)
bind -T lazygit C-l        detach
bind -T lazygit '`'        switch-client -T popup-prefix

# Ctrl+t: Persistent top popup (system monitor, toggles on/off)
# - Ctrl+t again hides it (top keeps running in background)
# - 'q' to quit top and destroy the session
bind -n C-t display-popup -E -w 80% -h 80% "~/.tmux/.tmux-top.sh"

# Ctrl+k: Interactive process killer popup (fzf-based)
bind -n C-k display-popup -E -w 90% -h 70% "~/.tmux/.tmux-kill.sh"

# F1: Quick cheatsheet popup (80% x 80%)
# Close: press any key
bind -n F1 display-popup -E -w 80% -h 80% "~/.tmux/.tmux-cheatsheet.sh"

##### --- Split pane shell (full features with copy-mode) ---
# Ctrl+s: Persistent split-pane shell (toggles on/off)
# - Ctrl+s again hides it (shell keeps running in background)
# - 'exit' to destroy the split session permanently
bind -n C-s run-shell "~/.tmux/.tmux-split.sh"

##### --- Status Bar (Modern & Informative) -------------------------------------

# Update status bar every 2 seconds
set -g status-interval 2

# Status bar position
set -g status-position bottom

# Status bar colors (cyan/blue theme matching cheatsheet)
set -g status-style bg=colour235,fg=colour250

# Left side: Session name with icon
set -g status-left-length 40
set -g status-left "#[fg=colour39,bold]#{?client_prefix,#[bg=colour208],#[bg=colour235]} ❐ #S #[bg=colour235] "

# Right side: Indicators + System stats + Time
set -g status-right-length 100
set -g status-right "#[fg=colour250]#{?pane_in_mode,#[fg=colour226]⎘ COPY #[fg=colour250],}#{?window_zoomed_flag,#[fg=colour208]⊡ ZOOM #[fg=colour250],}#[fg=colour39]⚡ #(top -bn1 | grep 'Cpu(s)' | awk '{print $2}' | cut -d'%' -f1)% #[fg=colour45]▦ #(free -m | awk '/Mem:/ {printf \"%.0f%%\", $3/$2*100}') #[fg=colour250]│ #[fg=colour39]%Y-%m-%d #[fg=colour45]%H:%M"

# Window list (center) - Enhanced with separators and flags
# Inactive windows: show number:name with flags and separator (hide _split windows)
set -g window-status-format "#{?#{==:#W,_split},,#[fg=colour244] #I#{?window_zoomed_flag,#[fg=colour208]Z#[fg=colour244],}#{?window_bell_flag,#[fg=colour208]!#[fg=colour244],}:#W #[fg=colour238]│}"

# Active window: highlighted with flags
set -g window-status-current-format "#[fg=colour39,bold] #I#{?window_zoomed_flag,#[fg=colour208]Z#[fg=colour39],}#{?window_bell_flag,#[fg=colour208]!#[fg=colour39],}:#W "

set -g window-status-separator ""

# Automatic window renaming
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_command}'

# Window activity
set -g window-status-activity-style fg=colour226,bold

# Window with bell
set -g window-status-bell-style fg=colour196,bold

# Remove separator (we're using │ in format)
set -g window-status-separator ""

# Center the window list
set -g status-justify centre

# Pane borders (clean, no status)
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39
set -g pane-border-status off

# Message styling (shown when you press Ctrl+b)
set -g message-style bg=colour39,fg=colour235,bold


##### --- Window Navigation (Alt+number, no prefix needed) ----------------------
# Start window numbering at 1 (not 0) for easier keyboard access
set -g base-index 1

# Alt+1 through Alt+9 to switch to windows 1-9
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9

# Alt+0 for last window (like browser Ctrl+9 for last tab)
bind -n M-0 select-window -l


##### --- Pane Navigation (Alt-based, no conflicts) -----------------------------
# Alt+h/j/k/l to switch panes without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt+arrow keys as alternative
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R


